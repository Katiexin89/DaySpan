<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DaySpan</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="mode-compact">
    <section class="compact-shell" id="compactShell" aria-label="DaySpan 悬浮记录窗">
      <header class="compact-header drag-region">
        <div class="compact-brand">
          <span class="brand-mark" aria-hidden="true">D</span>
          <div>
            <h1>DaySpan</h1>
            <p id="compactDateLabel">今天</p>
          </div>
        </div>

        <nav class="compact-toolbar no-drag" aria-label="悬浮窗工具栏">
          <button class="text-button" id="compactPinButton" title="切换置顶">置顶</button>
          <button class="text-button" id="expandButton" title="展开完整界面">展开</button>
          <button class="icon-button accent" id="compactNoteButton" title="新建随笔" aria-label="新建随笔">
            <span aria-hidden="true">＋</span>
          </button>
        </nav>
      </header>

      <section class="compact-quick no-drag" aria-label="快速添加今日待办">
        <input id="compactTaskInput" type="text" placeholder="写下今天要做的一件事" autocomplete="off" />
        <button id="compactTaskButton">添加</button>
      </section>

      <section class="compact-list no-drag" id="compactTaskList" aria-live="polite"></section>

      <footer class="compact-footer no-drag">
        <button class="text-button" id="lockButton" title="锁定或解锁拖动">可拖动</button>
        <label class="opacity-control" for="opacitySelect">
          <span>透明度</span>
          <select id="opacitySelect">
            <option value="1">100%</option>
            <option value="0.9">90%</option>
            <option value="0.8">80%</option>
            <option value="0.7">70%</option>
            <option value="0.6">60%</option>
          </select>
        </label>
      </footer>
    </section>

    <div class="app-shell full-shell hidden" id="fullShell">
      <header class="topbar drag-region">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">D</span>
          <div>
            <h1>DaySpan</h1>
            <p id="todayLabel">今天</p>
          </div>
        </div>

        <nav class="toolbar no-drag" aria-label="应用工具栏">
          <button class="text-button" id="collapseButton" title="收起为悬浮窗">收起</button>
          <button class="text-button" id="fullPinButton" title="切换置顶">置顶</button>
          <button class="icon-button" id="searchButton" title="搜索" aria-label="搜索">
            <span aria-hidden="true">⌕</span>
          </button>
          <button class="icon-button" id="historyButton" title="历史" aria-label="历史">
            <span aria-hidden="true">◷</span>
          </button>
          <button class="icon-button accent" id="newNoteButton" title="新建随笔" aria-label="新建随笔">
            <span aria-hidden="true">＋</span>
          </button>
          <button class="icon-button" id="minimizeButton" title="最小化" aria-label="最小化">
            <span aria-hidden="true">−</span>
          </button>
          <button class="icon-button" id="closeButton" title="关闭" aria-label="关闭">
            <span aria-hidden="true">×</span>
          </button>
        </nav>
      </header>

      <section class="quick-add no-drag" aria-label="快速添加待办">
        <input id="quickTaskInput" type="text" placeholder="写下今天要做的一件事" autocomplete="off" />
        <button id="quickTaskButton">添加</button>
      </section>

      <section class="view-switcher no-drag" aria-label="布局切换">
        <button class="segment active" data-layout="vertical">纵向</button>
        <button class="segment" data-layout="horizontal">横向</button>
      </section>

      <main id="dayBoard" class="day-board vertical no-drag" aria-live="polite"></main>
    </div>

    <div class="side-panel no-drag" id="notePanel" aria-hidden="true">
      <div class="panel-backdrop" data-close-panel></div>
      <article class="panel-card note-editor" role="dialog" aria-modal="true" aria-labelledby="notePanelTitle">
        <header class="panel-header">
          <div>
            <span class="eyebrow" id="noteDateLabel">今天</span>
            <h2 id="notePanelTitle">随笔</h2>
          </div>
          <button class="icon-button" data-close-panel title="关闭" aria-label="关闭">×</button>
        </header>

        <label class="field-label" for="noteTitleInput">标题</label>
        <input class="text-field" id="noteTitleInput" type="text" placeholder="随笔标题" />

        <label class="field-label" for="noteTagsInput">标签</label>
        <input class="text-field" id="noteTagsInput" type="text" placeholder="科研, 课程, 生活" />

        <div class="editor-tabs" role="tablist" aria-label="随笔模式">
          <button class="segment active" data-editor-tab="write">编辑</button>
          <button class="segment" data-editor-tab="preview">预览</button>
        </div>

        <textarea id="noteContentInput" class="note-textarea" placeholder="支持 Markdown 记录"></textarea>
        <div id="notePreview" class="markdown-preview hidden"></div>

        <footer class="panel-actions">
          <label class="summary-toggle">
            <input id="noteSummaryInput" type="checkbox" />
            <span>今日总结</span>
          </label>
          <button class="ghost-button" id="deleteNoteButton">删除</button>
          <button class="primary-button" id="saveNoteButton">保存</button>
        </footer>
      </article>
    </div>

    <div class="side-panel no-drag" id="historyPanel" aria-hidden="true">
      <div class="panel-backdrop" data-close-history></div>
      <article class="panel-card history-panel" role="dialog" aria-modal="true" aria-labelledby="historyTitle">
        <header class="panel-header">
          <div>
            <span class="eyebrow">归档</span>
            <h2 id="historyTitle">历史记录</h2>
          </div>
          <button class="icon-button" data-close-history title="关闭" aria-label="关闭">×</button>
        </header>
        <div class="history-tools">
          <input class="text-field" id="historySearchInput" type="search" placeholder="搜索待办、随笔或标签" />
          <button class="ghost-button" id="exportButton">导出</button>
        </div>
        <div id="historyList" class="history-list"></div>
      </article>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
